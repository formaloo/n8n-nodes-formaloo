name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected_tag"
            exit 1
          fi

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Validate n8n node
        run: npx --yes @n8n/node-cli@latest lint

      - name: Publish package
        run: npm publish --provenance --access public
